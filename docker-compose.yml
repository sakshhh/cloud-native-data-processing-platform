services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: fastapi-app

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres_data: