services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: fastapi-app

    env_file:
      - .env

    expose:
      - "8000"

    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: nginx-proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - api

volumes:
  postgres_data: