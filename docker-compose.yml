services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dataplatform

    ports:
      - "5432:5432"

  api:
    build: .

    container_name: fastapi-app

    ports:
      - "8000:8000"

    depends_on:
      - postgres
